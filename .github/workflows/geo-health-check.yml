name: GEO Health Check

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run GEO health check
        run: node scripts/public-geo-health-check.js
        env:
          GEO_SITE_URL: https://2707932128-hash.github.io/geo-agent-cloud/

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geo-health-check
          path: reports/geo-health-check.json
